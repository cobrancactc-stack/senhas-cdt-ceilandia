<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Atendente — Cartão de Todos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  :root {
    --verde: #1a7a45;
    --verde-escuro: #0d4f2c;
    --verde-claro: #e8f5ee;
    --amarelo: #f5c000;
    --bg: #f3f5f3;
    --card: #ffffff;
    --border: #e4e8e4;
    --text: #1a1f1a;
    --muted: #6b7a6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Inter', Arial, sans-serif; background: var(--bg); color: var(--text); }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--verde-escuro);
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0 1.5rem;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar img { height: 34px; filter: brightness(0) invert(1); }

  .topbar-title {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    margin-left: 4px;
  }

  .topbar-spacer { flex: 1; }

  .tab-btns {
    display: flex;
    gap: 2px;
    background: rgba(255,255,255,0.1);
    padding: 4px;
    border-radius: 10px;
  }

  .tab-btn {
    padding: 6px 18px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab-btn.active {
    background: #fff;
    color: var(--verde-escuro);
  }

  /* ── LAYOUT ── */
  .page { display: none; padding: 1.5rem; }
  .page.visible { display: block; }

  /* ── PAINEL ATENDENTE ── */
  .atend-grid {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 16px;
    max-width: 1100px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
  }

  .card-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 1.25rem;
  }

  /* SENHA ATUAL */
  .senha-atual-wrap {
    text-align: center;
    padding: 1rem 0 1.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.25rem;
  }

  .label-chamada {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .num-grande {
    font-size: 72px;
    font-weight: 900;
    color: var(--verde-escuro);
    letter-spacing: 4px;
    line-height: 1;
    transition: all 0.2s;
  }

  .num-grande.animado {
    animation: pulso 0.4s ease;
  }

  @keyframes pulso {
    0%  { transform: scale(0.9); opacity: 0.5; }
    60% { transform: scale(1.06); }
    100%{ transform: scale(1);   opacity: 1; }
  }

  .sub-chamada {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* CONTROLES */
  .sel {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    margin-bottom: 10px;
    cursor: pointer;
    appearance: auto;
  }

  .btn-chamar {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: var(--verde);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    margin-bottom: 8px;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-chamar:hover { background: var(--verde-escuro); }
  .btn-chamar:active { transform: scale(0.98); }

  .btn-repetir {
    width: 100%;
    padding: 11px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-repetir:hover { background: var(--bg); }

  .som-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--muted);
  }
  .som-row input { cursor: pointer; accent-color: var(--verde); width: 16px; height: 16px; }

  /* FILA */
  .fila-vazia {
    text-align: center;
    padding: 2.5rem 0;
    font-size: 13px;
    color: var(--muted);
  }

  .fila-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .fila-item:last-child { border: none; }

  .fila-senha {
    font-size: 16px;
    font-weight: 800;
    color: var(--verde-escuro);
    font-variant-numeric: tabular-nums;
  }

  .fila-setor {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .badge-norm { background: var(--verde-claro); color: var(--verde); }
  .badge-pref { background: #fff8dc; color: #a07000; }

  /* RELATÓRIO */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 1.25rem;
    max-width: 1100px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .stat-val {
    font-size: 36px;
    font-weight: 900;
    color: var(--verde-escuro);
    line-height: 1;
  }

  .rel-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    max-width: 1100px;
  }

  .rel-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .rel-toolbar span {
    font-size: 13px;
    color: var(--muted);
  }

  .btn-zerar {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid #e55;
    background: #fff;
    color: #e55;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  .btn-zerar:hover { background: #fff0f0; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  th {
    padding: 10px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  tr:last-child td { border: none; }
  tr:hover td { background: #fafcfa; }

  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .dot-ok { background: #27ae60; }
  .dot-wait { background: #f39c12; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--verde-escuro);
    color: #fff;
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.25s;
    z-index: 9999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

<script>
const SUPA_URL = 'https://ehpgvawwtpwczgsfvjxm.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVocGd2YXd3dHB3Y3pnc2Z2anhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNDcyNDIsImV4cCI6MjA5NzcyMzI0Mn0.ZolltWtU6_-QgUlwBhcTIT-wWJYXD2tJyvAngpFIoSQ';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

var filaLocal = [];
var ultimaChamada = null;

async function inicializar() {
  var hoje = new Date().toLocaleDateString('pt-BR');
  var { data } = await db.from('senhas').select('*').eq('data', hoje).order('id',{ascending:true});
  if (data) filaLocal = data;
  renderFila();
  renderRelatorio();
  assinarRealtime();
}

function assinarRealtime() {
  db.channel('atend_changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'senhas'}, function(payload) {
      var hoje = new Date().toLocaleDateString('pt-BR');
      if (payload.eventType === 'INSERT' && payload.new.data === hoje) {
        var existe = filaLocal.find(function(f){ return f.id === payload.new.id; });
        if (!existe) {
          var novo = payload.new;
          if (novo.tipo === 'Preferencial') {
            var idx = filaLocal.findIndex(function(f){ return f.status==='aguardando' && f.setor===novo.setor && f.tipo!=='Preferencial'; });
            if (idx >= 0) filaLocal.splice(idx, 0, novo); else {
              var ultimoPref = -1;
              filaLocal.forEach(function(f,i){ if(f.status==='aguardando'&&f.setor===novo.setor&&f.tipo==='Preferencial') ultimoPref=i; });
              filaLocal.splice(ultimoPref+1, 0, novo);
            }
          } else {
            filaLocal.push(novo);
          }
        }
      } else if (payload.eventType === 'UPDATE') {
        var i = filaLocal.findIndex(function(f){ return f.id===payload.new.id; });
        if (i >= 0) filaLocal[i] = payload.new;
      } else if (payload.eventType === 'DELETE') {
        filaLocal = filaLocal.filter(function(f){ return f.id!==payload.old.id; });
      }
      renderFila();
      renderRelatorio();
    })
    .subscribe();
}

function showTab(id, btn) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('visible'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('page-' + id).classList.add('visible');
  btn.classList.add('active');
  if (id === 'relatorio') renderRelatorio();
}

async function chamarProxima() {
  var setor = document.getElementById('atend-setor').value;
  var candidatos = filaLocal.filter(function(f){
    return f.status === 'aguardando' && (setor === 'all' || f.setor === setor);
  });
  if (candidatos.length === 0) {
    document.getElementById('num-grande').textContent = '—';
    document.getElementById('sub-chamada').textContent = 'Fila vazia para este setor';
    return;
  }
  var item = candidatos[0];
  var { error } = await db.from('senhas').update({status:'chamado'}).eq('id', item.id);
  if (error) { toast('Erro ao chamar senha.'); return; }
  item.status = 'chamado';
  ultimaChamada = item;

  var el = document.getElementById('num-grande');
  el.classList.remove('animado');
  void el.offsetWidth;
  el.classList.add('animado');
  el.textContent = item.senha;
  document.getElementById('sub-chamada').textContent = item.nome_setor + ' · ' + item.tipo;

  tocarSom();
  renderFila();
  renderRelatorio();
}

function repetirChamada() {
  if (!ultimaChamada) return;
  var el = document.getElementById('num-grande');
  el.classList.remove('animado');
  void el.offsetWidth;
  el.classList.add('animado');
  el.textContent = ultimaChamada.senha;
  document.getElementById('sub-chamada').textContent = ultimaChamada.nome_setor + ' · ' + ultimaChamada.tipo;
  tocarSom();
}

function tocarSom() {
  if (!document.getElementById('som-on').checked) return;
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523,659,784,1047].forEach(function(freq, i){
      var osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      var t = ctx.currentTime + i * 0.18;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.18, t+0.05);
      g.gain.linearRampToValueAtTime(0, t+0.18);
      osc.start(t); osc.stop(t+0.22);
    });
  } catch(e) {}
}

function renderFila() {
  var filtro = document.getElementById('fila-filtro').value;
  var lista = filaLocal.filter(function(f){
    return f.status === 'aguardando' && (filtro === 'all' || f.setor === filtro);
  });
  var el = document.getElementById('fila-list');
  if (lista.length === 0) {
    el.innerHTML = '<div class="fila-vazia">✅ Fila vazia</div>';
    return;
  }
  el.innerHTML = lista.map(function(f, i) {
    var cls = f.tipo === 'Preferencial' ? 'badge-pref' : 'badge-norm';
    var txt = f.tipo === 'Preferencial' ? '⭐ Pref.' : 'Normal';
    return '<div class="fila-item">'
      + '<div>'
      + '<div class="fila-senha">' + f.senha + '</div>'
      + '<div class="fila-setor">' + f.nome_setor + '</div>'
      + '</div>'
      + '<span class="badge ' + cls + '">' + txt + '</span>'
      + '</div>';
  }).join('');
}

function renderRelatorio() {
  var hoje = new Date().toLocaleDateString('pt-BR');
  document.getElementById('rel-data').textContent = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  var hist = filaLocal.filter(function(f){ return f.data === hoje; });
  document.getElementById('s-total').textContent = hist.length;
  document.getElementById('s-chamadas').textContent = hist.filter(function(h){ return h.status==='chamado'; }).length;
  document.getElementById('s-fila').textContent = hist.filter(function(h){ return h.status==='aguardando'; }).length;
  document.getElementById('s-pref').textContent = hist.filter(function(h){ return h.tipo==='Preferencial'; }).length;

  var tbody = document.getElementById('rel-body');
  if (!hist.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#aaa;padding:2rem;">Nenhuma senha emitida hoje</td></tr>';
    return;
  }
  tbody.innerHTML = hist.slice().reverse().map(function(h) {
    var dot = h.status==='chamado' ? 'dot-ok' : 'dot-wait';
    var label = h.status==='chamado' ? 'Chamado' : 'Aguardando';
    var bc = h.tipo==='Preferencial' ? 'badge-pref' : 'badge-norm';
    var bt = h.tipo==='Preferencial' ? '⭐ Pref.' : 'Normal';
    return '<tr>'
      + '<td style="font-weight:800;color:var(--verde-escuro)">' + h.senha + '</td>'
      + '<td>' + h.nome_setor + '</td>'
      + '<td><span class="badge ' + bc + '">' + bt + '</span></td>'
      + '<td>' + h.hora + '</td>'
      + '<td><span class="dot ' + dot + '"></span>' + label + '</td>'
      + '</tr>';
  }).join('');
}

async function zerarDia() {
  if (!confirm('Zerar todas as senhas do dia?')) return;
  var hoje = new Date().toLocaleDateString('pt-BR');
  await db.from('senhas').delete().eq('data', hoje);
  filaLocal = [];
  ultimaChamada = null;
  document.getElementById('num-grande').textContent = '—';
  document.getElementById('sub-chamada').textContent = 'Nenhuma senha chamada';
  renderFila();
  renderRelatorio();
  toast('Senhas do dia zeradas!');
}

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 3000);
}

inicializar();
</script>
