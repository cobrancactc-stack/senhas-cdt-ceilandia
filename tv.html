<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel TV — Cartão de Todos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--verde:#1a7a45;--verde-escuro:#0d4f2c;--amarelo:#f5c000;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;font-family:'Inter',Arial,sans-serif;background:#0a0f0a;color:#fff;overflow:hidden;}

  .tv-layout{
    height:100vh;
    display:grid;
    grid-template-rows:80px 1fr 220px;
  }

  /* HEADER */
  .tv-header{
    background:var(--verde-escuro);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 2.5rem;
    border-bottom:2px solid rgba(255,255,255,.08);
  }
  .tv-header img{height:38px;filter:brightness(0) invert(1);}
  .tv-header-center{text-align:center;}
  .tv-header-title{font-size:15px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:2px;text-transform:uppercase;}
  .tv-relogio{font-size:22px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;}
  .tv-data{font-size:12px;color:rgba(255,255,255,.45);margin-top:2px;}

  /* CHAMADA PRINCIPAL */
  .tv-main{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:0;
  }

  .chamada-atual{
    background:linear-gradient(135deg,var(--verde-escuro) 0%,#0a3d22 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:2.5rem;
    border-right:1px solid rgba(255,255,255,.06);
    position:relative;
    overflow:hidden;
  }
  .chamada-atual::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse 60% 60% at 50% 30%,rgba(26,122,69,.4) 0%,transparent 70%);
  }
  .chamada-label{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:1rem;position:relative;z-index:1;}
  .chamada-senha{font-size:120px;font-weight:900;color:#fff;letter-spacing:6px;line-height:1;position:relative;z-index:1;transition:all .3s;}
  .chamada-senha.animado{animation:tvPulso .5s ease;}
  @keyframes tvPulso{0%{transform:scale(.85);opacity:0;}60%{transform:scale(1.05);}100%{transform:scale(1);opacity:1;}}
  .chamada-setor{font-size:18px;font-weight:600;color:rgba(255,255,255,.6);margin-top:.75rem;position:relative;z-index:1;}
  .chamada-tipo{margin-top:.5rem;position:relative;z-index:1;}
  .chamada-tipo span{font-size:14px;font-weight:700;padding:5px 16px;border-radius:20px;}
  .tipo-pref{background:var(--amarelo);color:#6b4a00;}
  .tipo-norm{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);}
  .chamada-guiche-tv{
    margin-top:1.5rem;position:relative;z-index:1;
    background:var(--amarelo);color:#6b4a00;
    font-size:28px;font-weight:900;
    padding:12px 32px;border-radius:16px;
    letter-spacing:1px;
  }

  /* ÚLTIMAS CHAMADAS */
  .ultimas{
    background:#0d150d;
    padding:1.5rem 2rem;
    overflow:hidden;
  }
  .ultimas-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:1rem;}
  .ultimas-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .ultima-item{
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
    border-radius:12px;padding:.75rem 1rem;
    transition:all .3s;
  }
  .ultima-item.destaque{background:rgba(26,122,69,.25);border-color:rgba(26,122,69,.5);}
  .ultima-senha{font-size:24px;font-weight:900;color:#fff;letter-spacing:2px;}
  .ultima-info{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;}
  .ultima-guiche{font-size:12px;font-weight:700;color:var(--amarelo);margin-top:3px;}

  /* FILA RESUMO */
  .tv-rodape{
    background:#060d06;
    border-top:1px solid rgba(255,255,255,.06);
    display:flex;align-items:center;padding:0 2.5rem;gap:2rem;overflow:hidden;
  }
  .rodape-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);white-space:nowrap;}
  .fila-senhas{display:flex;gap:10px;flex-wrap:nowrap;overflow:hidden;}
  .fila-chip{
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
    border-radius:8px;padding:6px 14px;
    font-size:14px;font-weight:700;color:rgba(255,255,255,.7);
    white-space:nowrap;
  }
  .fila-chip.pref{background:rgba(245,192,0,.12);border-color:rgba(245,192,0,.3);color:var(--amarelo);}

  /* VAZIO */
  .aguardando{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100%;color:rgba(255,255,255,.15);
  }
  .aguardando-icon{font-size:64px;margin-bottom:1rem;}
  .aguardando-txt{font-size:16px;font-weight:600;letter-spacing:1px;}
</style>
</head>

      <div id="tv-relogio" class="tv-relogio">00:00:00</div>

  <!-- MAIN -->
  <div class="tv-main">

    <!-- SENHA ATUAL -->
    <div class="chamada-atual">
      <div id="main-label" class="chamada-label">Aguardando chamada...</div>
      <div id="main-senha" class="chamada-senha">—</div>
      <div id="main-setor" class="chamada-setor"></div>
      <div id="main-tipo" class="chamada-tipo"></div>
      <div id="main-guiche" class="chamada-guiche-tv" style="display:none;"></div>
    </div>

    <!-- ÚLTIMAS CHAMADAS -->
    <div class="ultimas">
      <div class="ultimas-title">Últimas senhas chamadas</div>

  </div>

  <div class="tv-rodape">
    <div class="rodape-label">Na fila:</div>
    <div id="fila-senhas" class="fila-senhas">
      <span style="font-size:13px;color:rgba(255,255,255,.2);">Nenhuma senha aguardando</span>
    </div>
  </div>

<script>
const SUPA_URL='https://ehpgvawwtpwczgsfvjxm.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVocGd2YXd3dHB3Y3pnc2Z2anhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNDcyNDIsImV4cCI6MjA5NzcyMzI0Mn0.ZolltWtU6_-QgUlwBhcTIT-wWJYXD2tJyvAngpFIoSQ';
const {createClient}=supabase;
const db=createClient(SUPA_URL,SUPA_KEY);

var filaLocal=[];
var ultimaChamada=null;

// Relógio
function atualizarRelogio(){
  var agora=new Date();
  document.getElementById('tv-relogio').textContent=agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('tv-data').textContent=agora.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
}
setInterval(atualizarRelogio,1000);
atualizarRelogio();

async function inicializar(){
  var hoje=new Date().toLocaleDateString('pt-BR');
  var {data}=await db.from('senhas').select('*').eq('data',hoje).order('id',{ascending:true});
  if(data){
    filaLocal=data;
    // Mostra última chamada se existir
    var chamadas=data.filter(function(f){return f.status==='chamado';});
    if(chamadas.length>0){
      ultimaChamada=chamadas[chamadas.length-1];
      renderChamadaAtual(ultimaChamada,false);
    }
  }
  renderUltimas();
  renderFila();
  assinarRealtime();
}

function assinarRealtime(){
  db.channel('tv_rt_'+Math.random())
    .on('postgres_changes',{event:'*',schema:'public',table:'senhas'},function(payload){
      var hoje=new Date().toLocaleDateString('pt-BR');
      if(payload.eventType==='INSERT'&&payload.new.data===hoje){
        if(!filaLocal.find(function(f){return f.id===payload.new.id;})){
          var novo=payload.new;
          if(novo.tipo==='Preferencial'){
            var idx=filaLocal.findIndex(function(f){return f.status==='aguardando'&&f.setor===novo.setor&&f.tipo!=='Preferencial';});
            if(idx>=0)filaLocal.splice(idx,0,novo);else filaLocal.push(novo);
          }else{filaLocal.push(novo);}
        }
      }else if(payload.eventType==='UPDATE'){
        var i=filaLocal.findIndex(function(f){return f.id===payload.new.id;});
        if(i>=0){
          var era=filaLocal[i].status;
          filaLocal[i]=payload.new;
          if(payload.new.status==='chamado'&&era!=='chamado'){
            ultimaChamada=payload.new;
            renderChamadaAtual(payload.new,true);
            tocarSomTV();
          }
        }
      }else if(payload.eventType==='DELETE'){
        filaLocal=filaLocal.filter(function(f){return f.id!==payload.old.id;});
      }
      renderUltimas();
      renderFila();
    }).subscribe();
}

function renderChamadaAtual(item,animado){
  document.getElementById('main-label').textContent='Senha chamada';
  var el=document.getElementById('main-senha');
  if(animado){el.classList.remove('animado');void el.offsetWidth;el.classList.add('animado');}
  el.textContent=item.senha;
  document.getElementById('main-setor').textContent=item.nome_setor;
  var tipoEl=document.getElementById('main-tipo');
  tipoEl.innerHTML=item.tipo==='Preferencial'
    ?'<span class="tipo-pref">⭐ Preferencial</span>'
    :'<span class="tipo-norm">Atendimento Normal</span>';
  var guicheEl=document.getElementById('main-guiche');
  if(item.guiche){
    guicheEl.textContent='📍 '+item.guiche;
    guicheEl.style.display='block';
  }else{
    guicheEl.style.display='none';
  }
}

function renderUltimas(){
  var chamadas=filaLocal.filter(function(f){return f.status==='chamado';});
  var grid=document.getElementById('ultimas-grid');
  if(!chamadas.length){
    grid.innerHTML='<div class="aguardando" style="grid-column:1/-1"><div class="aguardando-icon">🕐</div><div class="aguardando-txt">Sem chamadas ainda</div></div>';
    return;
  }
  var recentes=chamadas.slice(-8).reverse();
  grid.innerHTML=recentes.map(function(f,i){
    var destaque=i===0?'destaque':'';
    return '<div class="ultima-item '+destaque+'">'
      +'<div class="ultima-senha">'+f.senha+'</div>'
      +'<div class="ultima-info">'+f.nome_setor+' · '+f.hora+'</div>'
      +(f.guiche?'<div class="ultima-guiche">📍 '+f.guiche+'</div>':'')
      +'</div>';
  }).join('');
}

function renderFila(){
  var aguardando=filaLocal.filter(function(f){return f.status==='aguardando';});
  var el=document.getElementById('fila-senhas');
  if(!aguardando.length){
    el.innerHTML='<span style="font-size:13px;color:rgba(255,255,255,.2);">Nenhuma senha aguardando</span>';
    return;
  }
  el.innerHTML=aguardando.map(function(f){
    var cls=f.tipo==='Preferencial'?'pref':'';
    return '<span class="fila-chip '+cls+'">'+(f.tipo==='Preferencial'?'⭐ ':'')+f.senha+'</span>';
  }).join('');
}

function tocarSomTV(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[523,.18],[659,.15],[784,.15],[1047,.22]].forEach(function(p,i){
      var osc=ctx.createOscillator(),g=ctx.createGain();
      osc.connect(g);g.connect(ctx.destination);
      osc.type='sine';osc.frequency.value=p[0];
      var t=ctx.currentTime+i*0.2;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(p[1],t+.06);g.gain.linearRampToValueAtTime(0,t+.2);
      osc.start(t);osc.stop(t+.25);
    });
  }catch(e){}
}

inicializar();
</script>
